<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web Apps Simulator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script defer src="simulator.js"></script>
</head>
<body>

<!-- ───────── LEFT: Settings sidebar ───────── -->
<aside id="sidebar">

  <header class="side-header">
    <p class="side-header-eyebrow">Meta Ray-Ban Display</p>
    <h1>Web Apps Simulator</h1>
  </header>

  <nav class="side-nav">

    <!-- WEB APP LINK ─────────────────────────────────────────────── -->
    <div class="nav-group">
      <span class="nav-group-label">
        <!-- Glasses icon -->
        <svg width="14" height="14" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <ellipse cx="5" cy="10" rx="3.5" ry="2.8"/>
          <ellipse cx="13" cy="10" rx="3.5" ry="2.8"/>
          <line x1="8.5" y1="10" x2="9.5" y2="10"/>
          <line x1="1.5" y1="8.8" x2="1" y2="7.5"/>
          <line x1="16.5" y1="8.8" x2="17" y2="7.5"/>
        </svg>
        Web App Link
      </span>
      <div class="nav-group-body">
        <div id="url-bar">
          <input id="url-input" type="url" placeholder="https://your-app.vercel.app" autocomplete="off" spellcheck="false">
          <button class="pill-btn" id="load-btn">Load</button>
        </div>
        <div id="app-chips" role="toolbar" aria-label="App presets"></div>
      </div>
    </div>

    <!-- PLACEMENT ───────────────────────────────────────────────── -->
    <div class="nav-group">
      <span class="nav-group-label">
        <!-- Screen with HUD block in top-right corner -->
        <svg width="14" height="14" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="1" y="3" width="16" height="11" rx="1.5"/>
          <rect x="11.5" y="5" width="3.5" height="3.5" rx="0.7"/>
        </svg>
        Placement
      </span>
      <div class="nav-group-body">
        <div class="control-row">
          <label>Position</label>
          <div class="seg-control" id="position-seg" role="tablist">
            <button type="button" data-pos="top" class="active">Top</button>
            <button type="button" data-pos="middle">Middle</button>
          </div>
        </div>
        <div class="control-row">
          <label>Size</label>
          <div class="seg-control" id="size-seg" role="tablist">
            <button type="button" data-size="60" class="active">Medium</button>
            <button type="button" data-size="90">Large</button>
          </div>
        </div>
        <div class="slider-row">
          <label for="sl-opacity">Brightness</label>
          <input type="range" id="sl-opacity" min="30" max="100" value="100">
          <span id="lbl-opacity">100%</span>
        </div>
      </div>
    </div>

    <!-- BACKGROUND ──────────────────────────────────────────────── -->
    <div class="nav-group">
      <span class="nav-group-label">
        <!-- Landscape/image icon -->
        <svg width="14" height="14" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="1" y="3" width="16" height="12" rx="1.5"/>
          <circle cx="6" cy="8" r="1.6"/>
          <path d="M1 13l4.5-4.5 3.5 3.5 2.5-2.5 6.5 6"/>
        </svg>
        Background
      </span>
      <div class="nav-group-body">
        <div class="slider-row">
          <label for="sl-bg-brightness">Brightness</label>
          <input type="range" id="sl-bg-brightness" min="10" max="100" value="100">
          <span id="lbl-bg-brightness">100%</span>
        </div>
        <div id="bg-strip"></div>
      </div>
    </div>

  </nav>

  <!-- Share CTA -->
  <div id="share-cta">
    <button id="share-btn" type="button">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="13" cy="3" r="1.6"/>
        <circle cx="13" cy="13" r="1.6"/>
        <circle cx="3" cy="8" r="1.6"/>
        <line x1="4.6" y1="7.1" x2="11.4" y2="4.1"/>
        <line x1="4.6" y1="8.9" x2="11.4" y2="11.9"/>
      </svg>
      Share Prototype
    </button>
    <div id="share-toast">Link copied to clipboard!</div>
  </div>

</aside>

<!-- ───────── RIGHT: Simulator viewport ───────── -->
<main id="sim-viewport">
  <div id="scene">
    <img id="bg-img" alt="">
    <video id="bg-vid" loop muted autoplay playsinline></video>
  </div>

  <div id="display-wrap">
    <div class="wg-frame">
      <div id="wg-placeholder">
        <div class="ph-diamond"></div>
        <div class="ph-text">Pick an app</div>
      </div>
      <iframe
        id="app-iframe"
        src="about:blank"
        allow="accelerometer; autoplay; camera; clipboard-read; clipboard-write; geolocation; gyroscope; microphone"
        sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-pointer-lock"
      ></iframe>
    </div>
  </div>

  <div id="load-error">App blocked iframe embedding — try opening in a tab instead</div>
  <div id="sim-hint">Press <kbd>H</kbd> to go fullscreen &nbsp;·&nbsp; Click <kbd>☰</kbd> to show sidebar</div>
  <button id="exit-fullscreen-btn" type="button" title="Show sidebar" aria-label="Show sidebar">☰</button>
</main>

<input type="file" id="file-input" accept="image/*,video/*" style="display:none">

</body>
</html>
