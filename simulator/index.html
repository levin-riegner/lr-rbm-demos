<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Display Glasses Simulator</title>
  <link rel="stylesheet" href="styles.css">
  <script defer src="simulator.js"></script>
</head>
<body>

<!-- ───────── LEFT: Settings sidebar ───────── -->
<aside id="sidebar">

  <header class="side-header">
    <div class="side-header-logo">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
        <rect x="2" y="5" width="7" height="10" rx="3.5" stroke="#0866ff" stroke-width="1.6"/>
        <rect x="11" y="5" width="7" height="10" rx="3.5" stroke="#0866ff" stroke-width="1.6"/>
        <line x1="9" y1="10" x2="11" y2="10" stroke="#0866ff" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="side-header-text">
      <p class="side-header-eyebrow">Meta Ray-Ban Display</p>
      <h1>Glasses Simulator</h1>
    </div>
  </header>

  <nav class="side-nav">

    <div class="nav-group">
      <span class="nav-group-label">App</span>
      <div class="nav-group-body">
        <div id="url-bar">
          <input id="url-input" type="url" placeholder="https://your-app.vercel.app" autocomplete="off" spellcheck="false">
          <button class="pill-btn" id="load-btn">Load</button>
        </div>
        <div id="app-chips" role="toolbar" aria-label="App presets"></div>
      </div>
    </div>

    <div class="nav-group">
      <span class="nav-group-label">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="1" y="2" width="14" height="10" rx="1.5"/>
          <path d="M5 14h6M8 12v2"/>
        </svg>
        Display
      </span>
      <div class="nav-group-body">
        <div class="control-row">
          <label>Position</label>
          <div class="seg-control" id="position-seg" role="tablist">
            <button type="button" data-pos="top" class="active">Top</button>
            <button type="button" data-pos="middle">Middle</button>
          </div>
        </div>
        <div class="control-row">
          <label>Size</label>
          <div class="seg-control" id="size-seg" role="tablist">
            <button type="button" data-size="50" class="active">Medium</button>
            <button type="button" data-size="80">Large</button>
          </div>
        </div>
        <div class="slider-row">
          <label for="sl-opacity">Brightness</label>
          <input type="range" id="sl-opacity" min="30" max="100" value="100">
          <span id="lbl-opacity">100%</span>
        </div>
      </div>
    </div>

    <div class="nav-group">
      <span class="nav-group-label">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="1" y="3" width="14" height="10" rx="1.5"/>
          <circle cx="5.5" cy="7.5" r="1.2"/>
          <path d="M1 11.5l3.5-3.5 3 3 2-2 5.5 5"/>
        </svg>
        Background
      </span>
      <div class="nav-group-body">
        <div class="slider-row">
          <label for="sl-bg-brightness">Brightness</label>
          <input type="range" id="sl-bg-brightness" min="10" max="100" value="100">
          <span id="lbl-bg-brightness">100%</span>
        </div>
        <div id="bg-strip"></div>
      </div>
    </div>

  </nav>

  <!-- Share CTA pinned to bottom -->
  <div id="share-cta">
    <button id="share-btn" type="button">
      <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="13" cy="3" r="1.8"/>
        <circle cx="13" cy="13" r="1.8"/>
        <circle cx="3" cy="8" r="1.8"/>
        <line x1="4.8" y1="7" x2="11.2" y2="4"/>
        <line x1="4.8" y1="9" x2="11.2" y2="12"/>
      </svg>
      Share Prototype
    </button>
    <div id="share-toast">Link copied to clipboard!</div>
  </div>

</aside>

<!-- ───────── RIGHT: Simulator viewport ───────── -->
<main id="sim-viewport">
  <div id="scene">
    <img id="bg-img" alt="">
    <video id="bg-vid" loop muted autoplay playsinline></video>
  </div>

  <div id="display-wrap">
    <div class="wg-frame">
      <div id="wg-placeholder">
        <div class="ph-diamond"></div>
        <div class="ph-text">Pick an app</div>
      </div>
      <iframe
        id="app-iframe"
        src="about:blank"
        allow="accelerometer; autoplay; camera; clipboard-read; clipboard-write; geolocation; gyroscope; microphone"
        sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-pointer-lock"
      ></iframe>
    </div>
  </div>

  <div id="load-error">App blocked iframe embedding — try opening in a tab instead</div>
  <div id="sim-hint">Press <kbd>H</kbd> to go fullscreen &nbsp;·&nbsp; Click <kbd>☰</kbd> to show sidebar</div>
  <button id="exit-fullscreen-btn" type="button" title="Show sidebar" aria-label="Show sidebar">☰</button>
</main>

<input type="file" id="file-input" accept="image/*,video/*" style="display:none">

</body>
</html>
