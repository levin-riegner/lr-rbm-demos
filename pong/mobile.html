<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>LvR — Mobile</title>
    <link rel="stylesheet" href="mobile.css" />
  </head>
  <body>
    <div id="app">
      <!-- 1. Connecting — playful loading fragments. -->
      <section id="screen-connecting" class="screen">
        <div class="m-brand">PONG</div>
        <div class="loader-bricks" aria-hidden="true">
          <span></span><span></span><span></span><span></span><span></span>
        </div>
        <div
          class="fragment"
          id="connecting-fragment"
          aria-live="polite"
        >
          connecting the dots<span class="blinker" aria-hidden="true"></span>
        </div>
        <button
          class="m-btn"
          type="button"
          data-action="retry"
        >
          RETRY
        </button>
      </section>

      <!-- 2. Home -->
      <section id="screen-home" class="screen hidden">
        <div class="m-brand-block">
          <div class="m-brand">LvR</div>
          <div class="m-brand-tagline">Left vs. Right paddle game</div>
        </div>
        <div class="m-stack">
          <button class="m-btn m-btn-primary" type="button" data-action="create">
            CREATE ROOM
          </button>
          <button class="m-btn" type="button" data-action="show-join">
            JOIN ROOM
          </button>
        </div>
        <button class="m-btn m-btn-small" type="button" data-action="practice">
          PRACTICE
        </button>
      </section>

      <!-- 3. Waiting — room code -->
      <section id="screen-waiting" class="screen hidden">
        <div class="m-label">ROOM CODE</div>
        <div id="room-code" class="m-code" aria-live="polite">····</div>
        <div class="m-hint">
          Share this code with your opponent.
        </div>
        <div class="m-ttl" id="code-ttl" aria-live="polite"></div>
        <button class="m-btn m-btn-danger" type="button" data-action="leave">
          CANCEL
        </button>
      </section>

      <!-- 4. Join — native numeric keyboard + visible keypad. -->
      <section id="screen-join" class="screen hidden">
        <div class="m-label">ENTER ROOM CODE</div>
        <div class="m-code-input" id="m-code-input">
          <input
            type="tel"
            inputmode="numeric"
            pattern="[0-9]*"
            maxlength="4"
            class="m-code-field"
            id="m-code-field"
            autocomplete="off"
            autocorrect="off"
            autocapitalize="off"
            spellcheck="false"
            aria-label="Room code"
          />
          <span class="m-slot" data-slot="0">·</span>
          <span class="m-slot" data-slot="1">·</span>
          <span class="m-slot" data-slot="2">·</span>
          <span class="m-slot" data-slot="3">·</span>
        </div>
        <div class="m-keypad" id="m-keypad">
          <button class="m-key" data-key="1">1</button>
          <button class="m-key" data-key="2">2</button>
          <button class="m-key" data-key="3">3</button>
          <button class="m-key" data-key="4">4</button>
          <button class="m-key" data-key="5">5</button>
          <button class="m-key" data-key="6">6</button>
          <button class="m-key" data-key="7">7</button>
          <button class="m-key" data-key="8">8</button>
          <button class="m-key" data-key="9">9</button>
          <button class="m-key m-key-aux" data-key="clear">CLR</button>
          <button class="m-key" data-key="0">0</button>
          <button class="m-key m-key-aux" data-key="back">⌫</button>
        </div>
        <div id="join-status" class="m-ttl" aria-live="polite"></div>
        <div class="m-row">
          <button class="m-btn m-btn-primary" type="button" data-action="submit-code">
            CONNECT
          </button>
          <button class="m-btn m-btn-danger" type="button" data-action="leave">
            BACK
          </button>
        </div>
      </section>

      <!-- 5. Game — swipe / drag paddle, tap-to-boost. -->
      <section id="screen-game" class="screen hidden game-layout">
        <div class="score-row" aria-live="polite">
          <span id="score-left" class="score-left">0</span>
          <span class="score-sep">–</span>
          <span id="score-right" class="score-right">0</span>
        </div>
        <div id="practice-best" class="practice-best hidden" aria-live="polite">BEST 0</div>
        <canvas
          id="court"
          class="court-canvas"
          width="600"
          height="400"
          aria-label="Pong court"
        ></canvas>
        <div
          id="paddle-pad"
          class="paddle-pad"
          aria-label="Drag up and down to move your paddle. Swipe quickly for a speed boost."
        >
          <div class="paddle-pad-inner">
            <div class="paddle-pad-arrows">
              <div class="paddle-pad-up">▲</div>
              <div class="paddle-pad-hint" id="paddle-pad-hint">DRAG UP / DOWN</div>
              <div class="paddle-pad-down">▼</div>
            </div>
            <div class="boost-meter" id="boost-meter">
              <span></span><span></span><span></span><span></span>
            </div>
          </div>
        </div>
        <button class="m-btn m-btn-small m-btn-danger" type="button" data-action="leave">
          LEAVE
        </button>
      </section>

      <!-- 6. Game over -->
      <section id="screen-gameover" class="screen hidden">
        <div id="gameover-headline" class="gameover-headline">YOU WON</div>
        <div class="m-subtitle" id="gameover-detail">5 – 3</div>
        <div class="m-stack">
          <button class="m-btn m-btn-primary" type="button" data-action="ready">
            PLAY AGAIN
          </button>
          <button class="m-btn m-btn-danger" type="button" data-action="leave">
            LEAVE
          </button>
        </div>
        <div class="m-ttl" id="ready-status" aria-live="polite"></div>
      </section>

      <!-- 7. Disconnected -->
      <section id="screen-disconnected" class="screen hidden">
        <div class="status-glyph" aria-hidden="true">⟳</div>
        <div class="m-label">DISCONNECTED</div>
        <div class="m-subtitle" id="disconnected-detail">
          Lost connection to the server.
        </div>
        <div class="m-stack">
          <button class="m-btn m-btn-primary" type="button" data-action="retry">
            RECONNECT
          </button>
          <button class="m-btn" type="button" data-action="home">
            HOME
          </button>
        </div>
      </section>

      <!-- 8. Error -->
      <section id="screen-error" class="screen hidden">
        <div class="status-glyph danger" aria-hidden="true">!</div>
        <div class="m-label">SOMETHING WENT WRONG</div>
        <div class="m-subtitle" id="error-detail">Server error.</div>
        <button class="m-btn m-btn-primary" type="button" data-action="retry">
          TRY AGAIN
        </button>
      </section>
    </div>

    <script src="mobile.js"></script>
  </body>
</html>
