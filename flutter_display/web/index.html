<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Flutter Web counter for the Meta Ray-Ban Display.">
  <meta name="viewport" content="width=600, height=600, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#000000">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Counter">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Counter</title>
  <link rel="manifest" href="manifest.json">

  <style>
    /* On the glasses the viewport meta tag pins the browser to 600x600.
       On a desktop preview the window is larger; let body fill it so
       Flutter's MediaQuery (which reads window.innerWidth/innerHeight)
       agrees with what's actually visible, and the Center>SizedBox(600,600)
       in main.dart lands in the right place. */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      color-scheme: dark;
    }
  </style>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
